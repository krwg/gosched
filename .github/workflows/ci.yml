name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: |
          go test ./internal/... ./pkg/task ./pkg/visualizer ./tests/... \
            -race -coverprofile=coverage.out -covermode=atomic
          go test ./cmd/... ./examples/... ./pkg/rpc/... -race -count=1

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Benchmark smoke
        run: go test ./internal/heap ./internal/scheduler -bench=. -benchtime=100ms -run=^$$

      - name: Build CLI
        run: go build -o gosched ./cmd/scheduler

      - name: golangci-lint
        env:
          GOFLAGS: -buildvcs=false
        run: |
          go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2 run ./internal/... ./pkg/task/... ./pkg/visualizer/... ./cmd/...
